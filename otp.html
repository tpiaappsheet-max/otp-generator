<!DOCTYPE html>
<html>
<head>
<title>OTP Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
max-width:400px;
margin:auto;
}

#otp{
font-size:38px;
font-weight:bold;
color:#007bff;
margin:20px 0;
letter-spacing:5px;
}
</style>

</head>

<body>

<div class="box">

<h2>Your OTP</h2>

<div id="otp">------</div>

<button onclick="generateOTP()">
Generate OTP
</button>

</div>

<script>

function generateOTP(){

let otp =
Math.floor(100000 + Math.random()*900000);

document.getElementById("otp")
.innerHTML = otp;

}

window.onload = generateOTP;

</script>

</body>
</html>
