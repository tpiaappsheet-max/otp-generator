<!DOCTYPE html>
<html>
<head>
<title>OTP Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
max-width:400px;
margin:auto;
}

#otp{
font-size:38px;
font-weight:bold;
color:#007bff;
margin:20px 0;
letter-spacing:5px;
cursor:pointer;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#msg{
color:green;
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="box">

<h2>Your OTP</h2>

<div id="otp" onclick="copyOTP()" title="Click to Copy">
------
</div>

<button onclick="copyOTP()">
Copy OTP
</button>

<div id="msg"></div>

</div>

<script>

function generateOTP(){

let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let firstLetter =
letters.charAt(Math.floor(Math.random() * letters.length));

let secondLetter =
letters.charAt(Math.floor(Math.random() * letters.length));

let numbers =
Math.floor(1000 + Math.random() * 9000);

return firstLetter + secondLetter + numbers;

}

function loadOTP(){

let otp = sessionStorage.getItem("generatedOTP");

if(!otp){

otp = generateOTP();

sessionStorage.setItem("generatedOTP", otp);

}

document.getElementById("otp").innerHTML = otp;

}

function copyOTP(){

let otp =
document.getElementById("otp").innerText;

if (navigator.clipboard) {

navigator.clipboard.writeText(otp)
.then(function(){

document.getElementById("msg").innerHTML =
"OTP Copied Successfully";

});

} else {

let tempInput =
document.createElement("input");

tempInput.value = otp;

document.body.appendChild(tempInput);

tempInput.select();

document.execCommand("copy");

document.body.removeChild(tempInput);

document.getElementById("msg").innerHTML =
"OTP Copied Successfully";

}

}

window.onload = loadOTP;

</script>

</body>
</html>
