<!DOCTYPE html>
<html>

<head>

<title>OTP Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
max-width:400px;
margin:auto;
}

#message{
font-size:20px;
margin-bottom:20px;
color:#333;
font-weight:bold;
}

#otp{
font-size:38px;
font-weight:bold;
color:#007bff;
margin:20px 0;
letter-spacing:5px;
cursor:pointer;
}

#datetime{
font-size:16px;
color:#555;
margin-top:10px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:5px;
background:#007bff;
color:white;
}

button:hover{
background:#0056b3;
}

#msg{
color:green;
margin-top:10px;
font-size:14px;
}

</style>

<!-- html2canvas Library -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="box" id="captureArea">

<div id="message"></div>

<div id="otp">
------
</div>

<div id="datetime">
--
</div>

</div>

<br>

<button onclick="takeScreenshot()">
Take Screenshot
</button>

<div id="msg"></div>

<script>

function generateOTP(){

let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let otp = "";

for(let i = 0; i < 6; i++){

otp += chars.charAt(
Math.floor(Math.random() * chars.length)
);

}

return otp;

}

function formatDateTime(date){

let day = String(date.getDate()).padStart(2,'0');
let month = String(date.getMonth() + 1).padStart(2,'0');
let year = date.getFullYear();

let hours = String(date.getHours()).padStart(2,'0');
let minutes = String(date.getMinutes()).padStart(2,'0');
let seconds = String(date.getSeconds()).padStart(2,'0');

return `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;

}

function loadOTP(){

let otp = sessionStorage.getItem("generatedOTP");
let otpTime = sessionStorage.getItem("otpTime");

if(!otp){

otp = generateOTP();

let currentTime = formatDateTime(new Date());

sessionStorage.setItem("generatedOTP", otp);
sessionStorage.setItem("otpTime", currentTime);

otpTime = currentTime;

}

document.getElementById("otp").innerHTML = otp;

document.getElementById("datetime").innerHTML =
otpTime;

}

function loadMessage(){

let params =
new URLSearchParams(window.location.search);

let message =
params.get("msg");

if(message){

document.getElementById("message").innerHTML =
decodeURIComponent(message);

}

}

function takeScreenshot(){

html2canvas(document.getElementById("captureArea"))
.then(function(canvas){

let link =
document.createElement("a");

link.download = "OTP_Screenshot.png";

link.href = canvas.toDataURL();

link.click();

document.getElementById("msg").innerHTML =
"Screenshot Downloaded Successfully";

});

}

window.onload = function(){

loadOTP();

loadMessage();

};

</script>

</body>

</html>
